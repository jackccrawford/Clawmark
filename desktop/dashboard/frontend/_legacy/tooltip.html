<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Geniuz — Tooltip</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
</head>
<body class="tooltip-page">

<div class="tooltip-shell" role="tooltip" aria-label="Geniuz status">
  <div class="tt-title">Geniuz</div>
  <div class="tt-line">
    <span class="tt-dot"></span>
    <span class="tt-num">1,247</span>
    <span>memories</span>
    <span class="tt-sep">·</span>
    <span class="tt-num">+5</span>
    <span>today</span>
  </div>
  <div class="tt-line tt-recent">
    <span class="tt-mono">2m ago</span>
    <span class="tt-sep">·</span>
    <span class="tt-recent-gist">David approved pilot · start with lead-triage agent, 30-day trial</span>
  </div>
</div>

</body>
</html>
